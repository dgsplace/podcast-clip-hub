name: Daily Podcast Pipeline

on:
  schedule:
    # Run at 8 AM Eastern (13:00 UTC)
    - cron: '0 13 * * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Needed to push clips.json back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies (ffmpeg)
        run: sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Restore seen_episodes cache
        uses: actions/cache@v4
        with:
          path: seen_episodes.json
          key: seen-episodes-${{ runner.os }}
          restore-keys: seen-episodes-${{ runner.os }}

      - name: Run pipeline
        env:
          ASSEMBLYAI_API_KEY:    ${{ secrets.ASSEMBLYAI_API_KEY }}
          R2_ACCESS_KEY_ID:      ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY:  ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ACCOUNT_ID:         ${{ secrets.R2_ACCOUNT_ID }}
          R2_PUBLIC_URL:         ${{ secrets.R2_PUBLIC_URL }}
          ANTHROPIC_API_KEY:     ${{ secrets.ANTHROPIC_API_KEY }}
        run: python pipeline.py

      - name: Save seen_episodes cache
        uses: actions/cache@v4
        with:
          path: seen_episodes.json
          key: seen-episodes-${{ runner.os }}-${{ github.run_id }}

      - name: Commit updated clips.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/clips.json
          git diff --staged --quiet || git commit -m "chore: update clips [skip ci]"
          git push
